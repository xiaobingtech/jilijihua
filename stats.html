<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鸿蒙应用开发者激励计划2026</title>
  <style>
    :root {
      --bg-body: #080c18;
      --bg-header: rgba(14, 20, 38, 0.92);
      --bg-card: rgba(14, 20, 38, 0.88);
      --bg-stat: rgba(14, 20, 38, 0.85);
      --bg-input: rgba(14, 20, 38, 0.9);
      --bg-modal: rgba(14, 20, 38, 0.98);
      --bg-overlay: rgba(0, 0, 0, 0.6);
      --bg-hover: rgba(99, 102, 241, 0.06);
      --bg-metric: rgba(99, 102, 241, 0.06);
      --text-1: #f1f5f9;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --text-4: #475569;
      --border-1: rgba(148, 163, 184, 0.08);
      --border-2: rgba(148, 163, 184, 0.15);
      --border-hover: rgba(99, 102, 241, 0.3);
      --blue: #6366f1;
      --cyan: #06b6d4;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --purple: #a855f7;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.25);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.3);
      --chart-tooltip-bg: rgba(14, 20, 38, 0.96);
      --chart-tooltip-border: rgba(99, 102, 241, 0.2);
      --chart-tooltip-text: #e2e8f0;
      --chart-axis: rgba(148, 163, 184, 0.08);
      --chart-label: #64748b;
      --chart-area-start: rgba(99, 102, 241, 0.18);
      --chart-area-end: rgba(99, 102, 241, 0);
      --chart-line-start: #818cf8;
      --chart-line-end: #06b6d4;
      --chart-dot: #818cf8;
      --chart-dot-border: #0e1426;
      --chart-mark-color: rgba(34, 197, 94, 0.5);
      --chart-mark-label: #22c55e;
      --rating-bar-color: rgba(99, 102, 241, 0.5);
    }
    body.light-theme {
      --bg-body: #f4f6f9;
      --bg-header: rgba(255, 255, 255, 0.95);
      --bg-card: #ffffff;
      --bg-stat: #ffffff;
      --bg-input: #ffffff;
      --bg-modal: #ffffff;
      --bg-overlay: rgba(0, 0, 0, 0.35);
      --bg-hover: rgba(99, 102, 241, 0.04);
      --bg-metric: #f8fafc;
      --text-1: #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --text-4: #cbd5e1;
      --border-1: rgba(0, 0, 0, 0.06);
      --border-2: rgba(0, 0, 0, 0.1);
      --border-hover: rgba(99, 102, 241, 0.35);
      --blue: #4f46e5;
      --cyan: #0891b2;
      --green: #16a34a;
      --red: #dc2626;
      --yellow: #d97706;
      --purple: #9333ea;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.08);
      --chart-tooltip-bg: rgba(255, 255, 255, 0.98);
      --chart-tooltip-border: rgba(0, 0, 0, 0.08);
      --chart-tooltip-text: #334155;
      --chart-axis: rgba(0, 0, 0, 0.06);
      --chart-label: #94a3b8;
      --chart-area-start: rgba(79, 70, 229, 0.1);
      --chart-area-end: rgba(79, 70, 229, 0);
      --chart-line-start: #6366f1;
      --chart-line-end: #06b6d4;
      --chart-dot: #6366f1;
      --chart-dot-border: #ffffff;
      --chart-mark-color: rgba(22, 163, 74, 0.45);
      --chart-mark-label: #16a34a;
      --rating-bar-color: rgba(79, 70, 229, 0.45);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-body);
      min-height: 100vh;
      padding: 20px 28px;
      color: var(--text-1);
      transition: background 0.35s, color 0.35s;
    }
    .container { max-width: 1440px; margin: 0 auto; }

    /* ===== Header ===== */
    .header {
      background: var(--bg-header);
      border-radius: 16px;
      padding: 22px 28px;
      margin-bottom: 18px;
      border: 1px solid var(--border-1);
      box-shadow: var(--shadow-sm);
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(12px);
    }
    .header-left h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }
    .header-left p {
      color: var(--text-3);
      font-size: 12px;
      margin-top: 4px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-date {
      text-align: right;
    }
    .header-date .date-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--blue);
    }
    .header-date .date-label {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }
    .theme-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border-1);
      color: var(--text-3);
      font-size: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .theme-btn:hover {
      border-color: var(--border-hover);
      color: var(--blue);
    }

    /* ===== Stats Bar ===== */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    .stat-item {
      background: var(--bg-stat);
      border-radius: 12px;
      padding: 16px 18px;
      border: 1px solid var(--border-1);
      box-shadow: var(--shadow-sm);
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-item:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .stat-number {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .stat-label {
      font-size: 13px;
      color: var(--text-3);
      margin-top: 4px;
      letter-spacing: 1px;
    }
    .stat-item.s-total .stat-number { color: var(--blue); }
    .stat-item.s-pass .stat-number { color: var(--green); }
    .stat-item.s-fail .stat-number { color: var(--red); }
    .stat-item.s-rate .stat-number { color: var(--purple); }
    .stat-item.s-mau .stat-number { color: var(--cyan); }
    .stat-item.s-maurate .stat-number { color: var(--yellow); }

    /* ===== Toolbar ===== */
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .toolbar-search {
      flex: 1;
      min-width: 200px;
      background: var(--bg-input);
      border: 1px solid var(--border-1);
      border-radius: 10px;
      padding: 9px 16px;
      color: var(--text-1);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .toolbar-search:focus { border-color: var(--border-hover); }
    .toolbar-search::placeholder { color: var(--text-4); }
    .toolbar-select {
      background: var(--bg-input);
      border: 1px solid var(--border-1);
      border-radius: 10px;
      padding: 9px 16px;
      color: var(--text-2);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .toolbar-select:focus { border-color: var(--border-hover); }
    .toolbar-select option { background: var(--bg-card); color: var(--text-1); }
    .toolbar-count {
      font-size: 12px;
      color: var(--text-3);
      white-space: nowrap;
    }

    /* ===== Cards Grid ===== */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 1100px) {
      .cards-grid { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(3, 1fr); }
    }

    /* ===== App Card ===== */
    .app-card {
      background: var(--bg-card);
      border-radius: 14px;
      border: 1px solid var(--border-1);
      box-shadow: var(--shadow-sm);
      padding: 20px 22px;
      display: grid;
      grid-template-columns: minmax(0, calc(50% - 10px)) minmax(0, calc(50% - 10px));
      gap: 20px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .app-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    /* Card Left: Info */
    .card-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .card-app-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-1);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.4;
    }
    .card-badge {
      flex-shrink: 0;
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .card-badge.pass {
      background: rgba(34, 197, 94, 0.12);
      color: var(--green);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .card-badge.fail {
      background: rgba(239, 68, 68, 0.1);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.18);
    }
    .card-metrics {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .metric-label {
      font-size: 13px;
      color: var(--text-3);
      letter-spacing: 1px;
    }
    .metric-value {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-2);
      letter-spacing: 0.5px;
    }
    .metric-value.v-green { color: var(--green); }
    .metric-value.v-red { color: var(--red); }
    .metric-value.v-blue { color: var(--blue); font-size: 16px; }
    .metric-value.v-cyan { color: var(--cyan); }
    .metric-value.v-yellow { color: var(--yellow); }

    .metric-row.current-mau {
      align-items: flex-end;
      padding-bottom: 4px;
    }

    .card-increase {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .increase-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .increase-tag.pos {
      background: rgba(34, 197, 94, 0.1);
      color: var(--green);
    }
    .increase-tag.neg {
      background: rgba(239, 68, 68, 0.1);
      color: var(--red);
    }
    .increase-tag.zero {
      background: rgba(148, 163, 184, 0.08);
      color: var(--text-3);
    }
    /* Card Right: Chart */
    .card-chart-area {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .card-chart-title {
      font-size: 11px;
      color: var(--text-3);
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    .card-chart {
      width: 100%;
      height: 200px;
    }
    .card-chart-empty {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-4);
      font-size: 13px;
    }

    /* ===== Empty State ===== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-3);
    }
    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .empty-state .empty-text {
      font-size: 15px;
    }

  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <h1>鸿蒙应用开发者激励计划2026</h1>
        <p>达标标准: 最高有效月活 &ge; 400 且 月末评分 &ge; 3 且 评分个数 &ge; 10 &nbsp;|&nbsp; 作者: 范小兵</p>
      </div>
      <div class="header-right">
        <div class="header-date">
          <div class="date-value" id="statsDate">--</div>
          <div class="date-label">统计日期</div>
        </div>
        <button class="theme-btn" id="themeToggle" title="切换主题">&#9790;</button>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-item s-total"><div class="stat-number" id="totalCount">0</div><div class="stat-label">应用总数</div></div>
      <div class="stat-item s-pass"><div class="stat-number" id="passCount">0</div><div class="stat-label">达标应用</div></div>
      <div class="stat-item s-fail"><div class="stat-number" id="failCount">0</div><div class="stat-label">未达标</div></div>
      <div class="stat-item s-rate"><div class="stat-number" id="passRate">0%</div><div class="stat-label">达标率</div></div>
      <div class="stat-item s-mau"><div class="stat-number" id="mauPassCount">0</div><div class="stat-label">月活达标</div></div>
      <div class="stat-item s-maurate"><div class="stat-number" id="mauPassRate">0%</div><div class="stat-label">活跃达标率</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input type="text" class="toolbar-search" id="nameFilter" placeholder="搜索应用名称...">
      <select class="toolbar-select" id="statusFilter">
        <option value="all">全部状态</option>
        <option value="pass">综合达标</option>
        <option value="fail">综合未达标</option>
        <option value="mau-pass">月活达标</option>
        <option value="mau-fail">月活未达标</option>
      </select>
      <span class="toolbar-count" id="toolbarCount"></span>
    </div>

    <!-- Cards Grid -->
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <script src="echarts.min.js"></script>
  <script src="stats.js"></script>
</body>
</html>
